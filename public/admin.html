<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-bottom: 40px; background: white; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .action-btn { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px;}
        .edit-btn { background-color: #f39c12; }
    </style>
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <a href="index.html" class="back-link">← Back to Storefront</a>
    </header>

    <main style="max-width: 1000px; margin: 0 auto;">
        <h2>Products & Inventory</h2>
        <table id="products-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Price (€)</th>
                    <th>Times Bought</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products-body">
                </tbody>
        </table>

        <h2>Recent Orders</h2>
        <table id="orders-table">
            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>Address</th>
                    <th>Laptop ID</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="orders-body">
                </tbody>
        </table>
    </main>

    <script src="admin.js"></script>
</body>
</html>
